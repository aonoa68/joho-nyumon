site_name: 情報入門
site_description: 北星学園大学「情報入門」2026年度 授業資料
site_author: 小野原 彩香
# GitHub Pages 公開時のURL（aonoa68.github.io/joho-nyumon/ を想定）
site_url: https://aonoa68.github.io/joho-nyumon/

theme:
  name: material
  language: ja
  palette:
    # ライトモード
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    # ダークモード
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.instant     # ページ遷移を高速化
    - navigation.tracking    # URLに現在地を反映
    - navigation.top         # トップへ戻るボタン
    - navigation.footer      # 前後ページのナビ
    - search.suggest         # 検索サジェスト
    - search.highlight       # 検索ヒット箇所のハイライト
    - content.code.copy      # コードのコピーボタン
    - toc.follow             # 目次の自動追従
  icon:
    repo: fontawesome/brands/github

# 検索（日本語対応）
plugins:
  - search:
      lang:
        - ja

markdown_extensions:
  - admonition              # !!! note などのボックス
  - pymdownx.details        # 折りたたみ
  - pymdownx.superfences    # コードブロック強化
  - pymdownx.highlight:     # シンタックスハイライト
      anchor_linenums: true
  - pymdownx.tabbed:        # タブ
      alternate_style: true
  - tables                  # 表
  - attr_list               # 属性リスト
  - md_in_html
  - toc:
      permalink: true       # 見出しにリンクアイコン

# 左サイドのナビゲーション
nav:
  - ホーム: index.md
  - 授業の基本:
      - 授業のルール: rules.md
      - 各回の課題一覧: assignments.md
      - AIで確認（検証）する方法: ai-verify.md
  - 各回の資料:
      - 第2回 メール・タイピング: week02.md
      - 第3回 ファイル操作: week03.md
      - 第4回 Word：文章の構造: week04.md
      - 第4回 GPT Realtime Translate: week04-gpt-translate.md
      - 第5回 Word：図表の活用: week05.md
      - 第5回 AI画像生成の注意: week05-ai-image.md
      - 第6回 Excel：データ入力: week06.md
      - 第6回 AIと日米の賃金格差: week06-ai-wage.md
      - 第7回 データの読み方: week07.md
      - 第7回 情報の作法はいつ更新されるか: week07-info-norms.md
      - 第8回 余談：WebとHTML: week08-web-html.md
      - 第8回 Colab演習ノート: https://colab.research.google.com/drive/1GSgHtj9yiGqYRclslQMWlQsNGMQ52ild?usp=sharing
      - 第9回 データ整理・集計: week09.md
      - 第9回 余談：Excelと本の山: week09-honnoyama.md
      - 第10回 データ可視化: week10.md
      - 第12回 分析課題: week12.md
      - 第13回 最終レポート: week13.md
      - 第14回 振り返り: week14.md

